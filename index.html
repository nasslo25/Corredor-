<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Runner Pro Sound - Nasslo Muñoz Saez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chango&family=Nunito:wght@400;900&display=swap');
        body { font-family: 'Nunito', sans-serif; background-color: #020617; color: #fff; overflow: hidden; touch-action: none; height: 100dvh; }
        h1, h2, #score-display { font-family: 'Chango', cursive; text-shadow: 3px 3px 0px #4338ca; }
        .view { display: none; width: 100%; height: 100dvh; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; box-sizing: border-box; }
        .active { display: flex; }
        canvas#gameCanvas { width: 100%; max-width: 800px; aspect-ratio: 16/9; border: 6px solid #6366f1; border-radius: 2rem; background: radial-gradient(circle, #1e1b4b 0%, #020617 100%); box-shadow: 0 0 40px rgba(99, 102, 241, 0.3); }
        #qrcode { padding: 10px; background: white; border-radius: 1rem; }
        .camera-container { position: relative; width: 220px; height: 220px; border-radius: 50%; overflow: hidden; border: 4px solid #fbbf24; margin-bottom: 1rem; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
        #video-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .btn-retro { box-shadow: 0 6px 0 #1e1b4b; transition: all 0.1s; cursor: pointer; }
        .btn-retro:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e1b4b; }
    </style>
</head>
<body>

    <div id="view-host-wait" class="view">
        <div class="text-6xl mb-4">🏃‍♂️💨</div>
        <h1 class="text-5xl text-indigo-200 mb-6">RUNNER RADAR</h1>
        <div id="qrcode" class="mb-6"></div>
        <p id="host-status" class="animate-pulse text-indigo-300 font-bold">¡Escanea para conectar al niño!</p>
        <p class="mt-8 text-[10px] text-indigo-500 uppercase font-black tracking-widest">Nasslo Muñoz Saez • Sistema de Movimiento Pro</p>
    </div>

    <div id="view-host-game" class="view">
        <div class="flex justify-between w-full max-w-[800px] mb-4 px-6 bg-indigo-900/30 py-3 rounded-2xl border border-indigo-500/30">
            <h2 class="text-2xl text-yellow-400">SCORE: <span id="score-display">0</span></h2>
            <div class="text-right text-[10px] font-black text-indigo-400 uppercase">Procesando Movimiento Remoto</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="view-controller" class="view">
        <div id="step-camera" class="flex flex-col items-center w-full max-w-xs">
            <h2 class="text-2xl font-black mb-6 text-indigo-200">TU CARA DE VELOCIDAD</h2>
            <div class="camera-container"><video id="video-feed" autoplay playsinline></video></div>
            <button id="btn-capture" class="btn-retro bg-indigo-600 p-5 rounded-2xl w-full font-black text-xl">📸 ¡LISTO!</button>
        </div>
        <div id="step-play" class="hidden flex-col items-center text-center">
            <div class="w-32 h-32 bg-emerald-500/20 rounded-full flex items-center justify-center border-4 border-emerald-500 mb-6">
                <span class="text-6xl animate-bounce">🏃</span>
            </div>
            <h2 class="text-3xl font-black text-emerald-400 mb-2">¡ENLACE OK!</h2>
            <p class="text-indigo-200">Mueve el teléfono para esquivar<br>¡Salta para volar sobre cajas!</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isController = urlParams.get('role') === 'controller';
        const hostId = urlParams.get('host');
        let peer, connection, customHead = null;

        // --- MOTOR DE AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            if (type === 'jump') {
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } else if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(20, now + 0.5);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            } else if (type === 'point') {
                osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            }
        }

        // --- PEER JS ---
        peer = new Peer();
        
        if (isController) {
            document.getElementById('view-controller').classList.add('active');
            const video = document.getElementById('video-feed');
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

            peer.on('open', () => { connection = peer.connect(hostId); setupSensors(); });

            document.getElementById('btn-capture').onclick = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 200; canvas.height = 200;
                canvas.getContext('2d').drawImage(video, 0, 0, 200, 200);
                connection.send({ type: 'photo', data: canvas.toDataURL('image/png') });
                document.getElementById('step-camera').classList.add('hidden');
                document.getElementById('step-play').classList.remove('hidden');
            };
        } else {
            document.getElementById('view-host-wait').classList.add('active');
            peer.on('open', id => {
                const url = `${window.location.href.split('?')[0]}?role=controller&host=${id}`;
                new QRCode(document.getElementById("qrcode"), { text: url, width: 160, height: 160 });
            });
            peer.on('connection', conn => {
                connection = conn;
                conn.on('data', data => {
                    if (data.type === 'photo') {
                        const img = new Image();
                        img.onload = () => { customHead = img; startGame(); };
                        img.src = data.data;
                    }
                    if (data.type === 'move') player.targetLane = data.lane;
                    if (data.type === 'jump') { player.jump(); playSound('jump'); }
                });
            });
        }

        function setupSensors() {
            window.addEventListener('deviceorientation', e => {
                let lane = 1;
                if (e.gamma < -18) lane = 0; else if (e.gamma > 18) lane = 2;
                if (connection?.open) connection.send({ type: 'move', lane });
            });
            let lastJ = 0;
            window.addEventListener('devicemotion', e => {
                let a = e.accelerationIncludingGravity;
                if (a && (Math.abs(a.y) > 13 || Math.abs(a.z) > 13)) {
                    if (Date.now() - lastJ > 700) { 
                        connection.send({ type: 'jump' }); 
                        lastJ = Date.now(); 
                    }
                }
            });
        }

        // --- JUEGO ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0, frames = 0, isGameOver = false, obstacles = [];

        const player = {
            lane: 1, targetLane: 1, y: 0, vY: 0,
            update() {
                this.lane += (this.targetLane - this.lane) * 0.15;
                if (this.y < 0 || this.vY !== 0) {
                    this.vY += 0.8; this.y += this.vY;
                    if (this.y > 0) { this.y = 0; this.vY = 0; }
                }
            },
            jump() { if (this.y === 0) this.vY = -14; },
            draw() {
                const x = 140 + this.lane * 260;
                ctx.save();
                ctx.translate(x, 360 + this.y);
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.beginPath(); ctx.ellipse(0, 60, 45 - (this.y*-0.1), 15, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#6366f1";
                ctx.fillRect(-35, -20, 70, 70);
                if (customHead) {
                    ctx.save();
                    ctx.beginPath(); ctx.arc(0, -60, 50, 0, Math.PI*2); ctx.clip();
                    ctx.drawImage(customHead, -50, -110, 100, 100);
                    ctx.restore();
                }
                ctx.restore();
            }
        };

        function startGame() {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-host-game').classList.add('active');
            canvas.width = 800; canvas.height = 450;
            loop();
        }

        function loop() {
            if (isGameOver) return;
            frames++;
            ctx.fillStyle = "#020617"; ctx.fillRect(0, 0, 800, 450);
            
            // Carretera
            ctx.fillStyle = "#1e293b";
            ctx.beginPath(); ctx.moveTo(350, 0); ctx.lineTo(450, 0); ctx.lineTo(800, 450); ctx.lineTo(0, 450); ctx.fill();

            if (frames % 70 === 0) {
                obstacles.push({ lane: Math.floor(Math.random()*3), z: 0, color: `hsl(${frames%360}, 80%, 60%)` });
            }

            obstacles.forEach((o, i) => {
                o.z += 0.015 + (score * 0.0005);
                let x = (140 + o.lane * 260) * o.z + (400 * (1-o.z));
                let y = 450 * o.z;
                let size = 120 * o.z;

                ctx.fillStyle = o.color;
                ctx.shadowBlur = 15; ctx.shadowColor = o.color;
                ctx.fillRect(x - size/2, y - size, size, size);
                ctx.shadowBlur = 0;

                if (o.z > 0.75 && o.z < 0.88 && Math.round(player.lane) === o.lane && player.y > -30) {
                    isGameOver = true; playSound('crash');
                    setTimeout(() => location.reload(), 2000);
                }
                if (o.z > 1) { obstacles.splice(i, 1); score++; playSound('point'); document.getElementById('score-display').innerText = score; }
            });

            player.update(); player.draw();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
